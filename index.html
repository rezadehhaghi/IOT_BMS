<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Live Sensor Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            text-align: center;
            padding: 50px;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: inline-block;
            min-width: 280px;
            border-top: 5px solid #2ecc71;
        }
        h2 {
            color: #2c3e50;
            margin-top: 0;
            font-size: 1.5rem;
        }
        .value {
            font-size: 3.5rem;
            font-weight: bold;
            color: #2ecc71;
            margin: 20px 0;
        }
        .status {
            font-size: 0.85rem;
            color: #7f8c8d;
            background: #edeae680;
            padding: 8px 12px;
            border-radius: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>ESP32 Sensor Reading</h2>
        <!-- The live value will replace this text -->
        <div class="value" id="sensor-data">Loading...</div>
        <div class="status" id="timestamp">Connecting to server...</div>
    </div>

    <script>
        // 🔒 SECURITY CHECK: Paste your Read API Key here if your channel is Private.
        // If your channel is explicitly set to Public, you can leave this blank "".
        const READ_API_KEY = "YOUR_THINGSPEAK_READ_API_KEY"; 
        
        // Base API Address provided by ThingSpeak for Channel 3386022
        let url = "https://thingspeak.com";

        // Automatically append the Read API Key to authenticate the request if provided
        if (READ_API_KEY !== "" && READ_API_KEY !== "YOUR_THINGSPEAK_READ_API_KEY") {
            url += `&api_key=${READ_API_KEY}`;
        }

        async function getLiveValue() {
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // Extract the array of feeds from the JSON payload
                const feeds = data.feeds;
                
                // Select the most recent feed item at the end of the array
                const latestFeed = feeds[feeds.length - 1];
                
                // Extract individual data properties
                const sensorValue = latestFeed.field1;
                const rawTime = new Date(latestFeed.created_at);
                const formattedTime = rawTime.toLocaleTimeString();

                // Check for valid data before updating UI
                if (sensorValue !== null && sensorValue !== undefined) {
                    document.getElementById('sensor-data').innerText = sensorValue;
                    document.getElementById('timestamp').innerText = `Last updated at: ${formattedTime}`;
                } else {
                    document.getElementById('sensor-data').innerText = "Empty";
                    document.getElementById('timestamp').innerText = "No recent data in field";
                }
                
            } catch (error) {
                console.error("Failed to fetch data:", error);
                document.getElementById('sensor-data').innerText = "--";
                document.getElementById('timestamp').innerText = "Connection Error";
            }
        }

        // Run data lookup immediately when the page finishes loading
        getLiveValue();

        // Refresh the page data every 15 seconds to sync with ThingSpeak
        setInterval(getLiveValue, 15000);
    </script>
</body>
</html>
